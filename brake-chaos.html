<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>止まれ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

#wrap { width:100%; max-width:480px; }

canvas {
  width:100%;
  display:block;
  image-rendering:pixelated;
  border:3px solid #f80;
}

#cockpit { height:120px; }
#windshield { height:80px; }

#btn-area {
  padding:10px;
  background:#000;
}

#brake-btn {
  width:100%;
  height:70px;
  background:#c00;
  color:#fff;
  font:bold 28px monospace;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="windshield"></canvas>
  <canvas id="cockpit"></canvas>
  <div id="btn-area">
    <button id="brake-btn">BRAKE</button>
  </div>
</div>
<script>

// ===== canvas =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const windshield = document.getElementById('windshield');
const ctx3 = windshield.getContext('2d');

const cockpit = document.getElementById('cockpit');
const ctx2 = cockpit.getContext('2d');

canvas.width = 320;
canvas.height = 200;
windshield.width = 320;
windshield.height = 80;
cockpit.width = 320;
cockpit.height = 120;

let frame = 0;
let speedDisp = 200;

// ===== draw main =====
function draw() {
  ctx.clearRect(0,0,320,200);

  // 適当な背景
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,320,200);

  drawWindshield();
  drawCockpit();
}

// ===== windshield =====
function drawWindshield() {
  ctx3.clearRect(0,0,320,80);

  ctx3.fillStyle = '#081018';
  ctx3.fillRect(0,0,320,80);

  // 道路
  ctx3.fillStyle = '#111';
  ctx3.beginPath();
  ctx3.moveTo(150, 40);
  ctx3.lineTo(170, 40);
  ctx3.lineTo(320, 80);
  ctx3.lineTo(0, 80);
  ctx3.closePath();
  ctx3.fill();

  // 中央ライン
  ctx3.strokeStyle = '#ff0';
  ctx3.lineWidth = 2;

  const flow = (frame*3)%40;

  for(let i=0;i<6;i++){
    const y = 40 + i*10 + flow;
    const spread = i*6;

    ctx3.beginPath();
    ctx3.moveTo(160-spread, y);
    ctx3.lineTo(160-spread-4, y+12);
    ctx3.stroke();

    ctx3.beginPath();
    ctx3.moveTo(160+spread, y);
    ctx3.lineTo(160+spread+4, y+12);
    ctx3.stroke();
  }
}

// ===== cockpit =====
function drawCockpit() {

  ctx2.clearRect(0,0,320,120);

  ctx2.fillStyle = '#05070c';
  ctx2.fillRect(0,0,320,120);

  // スピード表示
  ctx2.fillStyle='#0af';
  ctx2.font='20px monospace';
  ctx2.fillText(speedDisp+' km/h',100,40);

  // ===== ハンドル揺れ =====
  const shake = Math.sin(frame*0.2) * 5;

  ctx2.save();
  ctx2.translate(shake,0);

  ctx2.strokeStyle='#aaa';
  ctx2.lineWidth=6;
  ctx2.beginPath();
  ctx2.arc(160,110,50,Math.PI,Math.PI*2);
  ctx2.stroke();

  ctx2.restore();

  // ===== 手（でかい） =====

  // 左
  ctx2.fillStyle='#fca';
  ctx2.fillRect(100,95,18,10);
  ctx2.fillRect(98,88,5,10);
  ctx2.fillRect(104,86,5,10);
  ctx2.fillRect(110,88,5,10);

  // 指輪
  ctx2.fillStyle='#ff0';
  ctx2.fillRect(104,90,5,2);

  // 右
  ctx2.fillStyle='#fca';
  ctx2.fillRect(200,95,18,10);
  ctx2.fillRect(218,88,5,10);
  ctx2.fillRect(212,86,5,10);
  ctx2.fillRect(206,88,5,10);

  ctx2.fillStyle='#ff0';
  ctx2.fillRect(212,90,5,2);
}

// ===== loop =====
function loop(){
  frame++;
  speedDisp += 0.5;
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
