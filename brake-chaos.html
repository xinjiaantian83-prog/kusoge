<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>止まれ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
#wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:480px;
}
#hud {
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:4px 10px 6px;
  background:#000;
  border-bottom:3px solid #f80;
}
.hud-block { text-align:center; }
.hud-label { color:#555; font:bold 9px monospace; letter-spacing:2px; }
.hud-val   { font:bold 18px monospace; letter-spacing:1px; }
#title-val { color:#f80; font-size:20px; text-shadow:0 0 8px #f804; }
#score-val { color:#ff0; }
#speed-val { color:#0ff; font-size:20px; }
#danger-bar {
  width:100%; height:7px;
  background:#111;
  border-bottom:2px solid #300;
  overflow:hidden;
}
#danger-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#f00,#f80,#ff0);
}
canvas {
  display:block;
  width:100%;
  background:#000;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border-left:3px solid #f80;
  border-right:3px solid #f80;
}
#btn-area {
  width:100%;
  padding:10px;
  background:#0a0000;
  border-top:3px solid #f80;
  border-bottom:3px solid #f80;
}
#brake-btn {
  display:block;
  width:100%;
  height:68px;
  background:#c00;
  color:#fff;
  font:bold 28px monospace;
  letter-spacing:8px;
  border:0;
  border-bottom:6px solid #700;
  border-right:4px solid #700;
  cursor:pointer;
  text-shadow:2px 2px 0 #900;
  box-shadow:0 0 20px #f005, inset 0 1px 0 #f88;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  outline:none;
}
#brake-btn:active { filter:brightness(1.4); }
#credit {
  color:#333;
  font:10px monospace;
  padding:6px 0;
  letter-spacing:3px;
  background:#000;
  width:100%;
  text-align:center;
}
  #start-btn {
  width:100%;
  height:60px;
  font:bold 22px monospace;
  background:#080;
  color:#fff;
  border:0;
}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="score-val">0000000</div>
    </div>
    <div class="hud-block">
      <div class="hud-val" id="title-val">止まれ</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">SPEED</div>
      <div class="hud-val" id="speed-val">080</div>
    </div>
  </div>
  <div id="danger-bar"><div id="danger-fill"></div></div>
  <canvas id="c"></canvas>
  <button id="start-btn">▶ START</button>
  <div id="btn-area">
    <button id="brake-btn">■ BRAKE</button>
  </div>
  <div id="credit">© TOMARE INDUSTRIES  INSERT COIN</div>
</div>
<audio id="bgm" src="kaazoom-honkytonk-jam-rockabilly-music-403469.mp3" loop preload="auto"></audio>
<script>

  
// ── Canvas setup ───────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CW = 320, CH = 200;
canvas.width = CW; canvas.height = CH;

const elScore  = document.getElementById('score-val');
const elSpeed  = document.getElementById('speed-val');
const elDanger = document.getElementById('danger-fill');

// ── State ──────────────────────────────────────────────────
const S = { RUN:0, STOP:1, FLY:2, RESULT:3 };
let state, frame, speedDisp, speedTarget;
  let slowTimer = 0;
let scroll;        // ground/road scroll offset
let cliffX;        // cliff left edge in screen coords
let carX, carY, carVY; // car pos (carX fixed, carY for falling)
let carFalling;
let hitstop, flashF;
let drv;
let resultAlpha, resultTimer, exScore;

// Layout constants
const GROUND_Y = 148;  // top of ground strip
const CAR_X    = 80;   // car always here horizontally
const CAR_DRAW_Y = GROUND_Y; // wheel base

// ── Reset ──────────────────────────────────────────────────
function reset() {
  state       = S.RUN;
  frame       = 0;
  speedDisp   = 80;
  speedTarget = 80;
  scroll      = 0;
  cliffX      = CW + 60;  // starts off-screen right
  carX        = CAR_X;
  carY        = CAR_DRAW_Y;
  carVY       = 0;
  carFalling  = false;
  hitstop     = 0;
  flashF      = 0;
  drv         = { x:0, y:0, vx:0, vy:0, angle:0, spin:0, active:false, trail:[] };
  resultAlpha = 0;
  resultTimer = 0;
  exScore     = 0;
  elDanger.style.width = '0%';
  elScore.textContent  = '0000000';
  elSpeed.textContent  = '080';
}
reset();

// ── Pixel helper ───────────────────────────────────────────
function px(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(x|0, y|0, w, h);
}

// ── Sky ────────────────────────────────────────────────────
function drawSky() {
  // Sky gradient bands
  px(0,  0, CW, 80, '#0d0d1a');
  px(0, 55, CW, 30, '#141430');
  // Stars — scroll slowly (parallax)
  const STARS = [[15,8],[58,6],[112,15],[193,7],[250,19],[305,11],[88,29],[174,23],[232,31],[48,42],[290,38]];
  ctx.fillStyle = '#fff';
  const ox = scroll * 0.015 % CW;
  for (const [sx, sy] of STARS) {
    const rx = ((sx - ox % CW) + CW * 2) % CW;
    ctx.fillRect(rx|0, sy, 2, 2);
  }
  // Distant hills (scroll at 0.3x — mid parallax)
  const hx = scroll * 0.3 % (CW * 2);
  ctx.fillStyle = '#1a2a10';
  const hills = [[0,30],[80,20],[160,28],[240,18],[320,26],[400,22],[480,30],[560,20]];
  ctx.beginPath();
  ctx.moveTo(0, 86);
  for (const [hsx, hsy] of hills) {
    const rx = ((hsx - hx % (CW * 2)) + CW * 4) % (CW * 2) - CW;
    ctx.quadraticCurveTo(rx + 40, 86 - hsy, rx + 80, 86);
  }
  ctx.lineTo(CW, 86); ctx.lineTo(0, 86); ctx.closePath(); ctx.fill();
}

// ── Ground & road ──────────────────────────────────────────
function drawGround() {
  const GY = GROUND_Y;

  // Ground fill
  px(0, GY, CW, CH - GY, '#1a3a0d');
  // Top grass edge
  px(0, GY, CW, 5, '#4a8c2a');

  // Road surface (band in lower portion)
  const RY = GY + 5, RH = 40;
  px(0, RY, CW, RH, '#2c2c2c');

  // Road edge lines
  px(0, RY,          CW, 3, '#ccc');
  px(0, RY + RH - 3, CW, 3, '#ccc');

  // Center dashes — scroll rightward at road speed
  const dashW = 20, dashH = 4, gap = 16;
  const period = dashW + gap;
  const offset = scroll % period;
  ctx.fillStyle = '#ff0';
  for (let x = -period + (period - offset % period); x < CW + period; x += period) {
    ctx.fillRect(x|0, (RY + RH/2 - dashH/2)|0, dashW, dashH);
  }

  // Sub-ground
  px(0, RY + RH, CW, CH - (RY + RH), '#0d1f06');
}

// ── Cliff ──────────────────────────────────────────────────
function drawCliff(cx) {
  if (cx > CW) return;
  const GY = GROUND_Y;
  const GH = CH - GY;
  const x  = cx|0;
  const GW = 60;  // gap width

  // Warning stripes along top of cliff edge
  for (let i = 0; i < 10; i++) {
    px(x + i * 8,     GY - 6, 4, 9, '#f00');
    px(x + i * 8 + 4, GY - 6, 4, 9, '#ff0');
  }

  // Black abyss
  px(x, GY, GW, GH, '#000005');

  // Left cliff face (near edge)
  for (let d = 0; d < 12; d++) {
    const c = d < 4 ? '#3a200a' : '#6b4820';
    px(x + d, GY + d, 2, GH - d, c);
  }
  // Rock strata lines
  ctx.fillStyle = '#4a3015';
  for (let d = 12; d < GH; d += 14) ctx.fillRect(x + 2, GY + d, 10, 2);

  // Abyss depth lines
  ctx.fillStyle = '#000820';
  for (let d = 10; d < GH; d += 8) ctx.fillRect(x + 14, GY + d, GW - 16, 1);

  // Far cliff face
  px(x + GW - 8, GY, 8, GH, '#6b4820');
  px(x + GW - 8, GY, 2, GH, '#3a200a');

  // Far ground continues
  px(x + GW, GY, CW, GH, '#1a3a0d');
  px(x + GW, GY, CW, 5,  '#4a8c2a');
  px(x + GW, GY + 5, CW, 35, '#2c2c2c');
  px(x + GW, GY + 5, CW,  3, '#ccc');
  px(x + GW, GY + 37, CW, 3, '#ccc');
}

// ── Car (side view, facing right) ──────────────────────────
function drawCar(x, y) {
  // y = wheel-base Y
  const xi = x|0, yi = y|0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(xi + 4, yi + 2, 54, 6);

  // Body (long low rectangle)
  px(xi,      yi - 18, 58, 16, '#d07020');  // main body
  px(xi + 2,  yi - 18, 54, 14, '#e88830');  // highlight

  // Cabin / roof
  px(xi + 10, yi - 32, 30, 16, '#f0a040');
  px(xi + 12, yi - 30, 26, 12, '#f8b850');

  // Windshield (front = right side)
  px(xi + 36, yi - 30, 10, 12, '#7adeff');
  // Rear window (left side)
  px(xi + 14, yi - 30, 10, 12, '#7adeff');
   // Driver face (always visible)
  px(xi + 37, yi - 27, 6, 6, '#fca');
  px(xi + 38, yi - 26, 1, 1, '#000');
  px(xi + 41, yi - 26, 1, 1, '#000');
  // Window pillar
  px(xi + 24, yi - 30,  3, 12, '#e09030');

  // Front bumper / nose
  px(xi + 54, yi - 14,  6,  8, '#b06010');
  px(xi + 56, yi - 20,  3,  6, '#cc7020');

  // Headlight
  px(xi + 56, yi - 26,  4,  6, '#ffffcc');
  px(xi + 57, yi - 24,  3,  3, '#ffffff');

  // Rear tail
  px(xi,      yi - 16,  4,  6, '#cc2200');
  px(xi + 1,  yi - 15,  2,  3, '#ff4422');

  // Spoiler (rear top)
  px(xi + 2,  yi - 34,  5,  4, '#c06010');
  px(xi + 2,  yi - 37,  5,  2, '#f08020');

  // Exhaust pipe (rear bottom)
  px(xi,      yi -  4,  6,  3, '#666');
  px(xi - 4,  yi -  3,  5,  2, '#999');

  // Underbody
  px(xi + 6,  yi -  2, 46,  3, '#804010');

  // Wheels (left=rear, right=front from side view)
  // Rear wheel
  px(xi + 8,  yi - 6,  14, 10, '#111');
  px(xi + 10, yi - 5,  10,  8, '#2a2a2a');
  px(xi + 13, yi - 2,   4,  4, '#555');  // hub
  px(xi + 14, yi - 1,   2,  2, '#888');

  // Front wheel
  px(xi + 36, yi - 6,  14, 10, '#111');
  px(xi + 38, yi - 5,  10,  8, '#2a2a2a');
  px(xi + 41, yi - 2,   4,  4, '#555');
  px(xi + 42, yi - 1,   2,  2, '#888');

  // Speed lines (horizontal, to the left)
 if (state === S.RUN || state === S.FLY) {
  ctx.fillStyle = 'rgba(255,180,0,0.25)';

  const boost = Math.min(3, speedDisp / 200);

  for (let i = 0; i < 8; i++) {
    const lw = 20 + i * 10 * boost;
    const y = yi - 28 + i * 4;
    ctx.fillRect(xi - 10 - lw, y, lw, 2);
  }
}
}

// ── Driver (small pixel person) ────────────────────────────
function drawDriver(d) {
  if (!d.active) return;

  // Ghost trail
  for (let i = 0; i < d.trail.length; i++) {
    const t = d.trail[i];
    const a = (i / d.trail.length) * 0.2;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(t.x|0, t.y|0);
    ctx.rotate(t.angle);
    px(-6, -20, 12, 11, '#fca');
    px(-6,  -9, 12, 13, '#35f');
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  ctx.save();
  ctx.translate(d.x|0, d.y|0);
  ctx.rotate(d.angle);

  // Head
  px(-6, -20, 12, 11, '#fca');
  // Panic eyes
  px(-5, -18,  3,  3, '#000'); px(-5,-18, 1, 1, '#fff');
  px( 2, -18,  3,  3, '#000'); px( 2,-18, 1, 1, '#fff');
  // Wide-open mouth
  px(-4, -12,  8,  4, '#000');
  px(-3, -11,  6,  2, '#f44');
  // Body
  px(-6,  -9, 12, 13, '#35f');
  // Arms flailing
  px(-14,  -9,  8,  3, '#fca');
  px(-17, -13,  5,  5, '#fca');
  px(  6,  -9,  8,  3, '#fca');
  px( 12, -13,  5,  5, '#fca');
  // Legs
  px(-6,   4,  5, 10, '#222');
  px( 1,   4,  5, 10, '#222');

  ctx.restore();
}

// ── Flash overlay ──────────────────────────────────────────
function drawFlash() {
  if (flashF <= 0) return;
  ctx.fillStyle = `rgba(255,255,255,${(flashF / 8) * 0.8})`;
  ctx.fillRect(0, 0, CW, CH);
  flashF--;
}

// ── Result overlay ─────────────────────────────────────────
function drawResult() {
  if (resultAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, resultAlpha);

  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(0, 0, CW, CH);

  const cx = CW/2, cy = CH/2;
  const hue = (frame * 11) % 360;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // EXCELLENT!!
  ctx.font = 'bold 40px monospace';
  ctx.lineWidth = 7; ctx.strokeStyle = '#000';
  ctx.strokeText('EXCELLENT!!', cx, cy - 28);
  ctx.fillStyle = `hsl(${hue},100%,62%)`;
  ctx.fillText('EXCELLENT!!', cx, cy - 28);

  // Score
  ctx.font = 'bold 20px monospace';
  ctx.lineWidth = 4; ctx.strokeStyle = '#000';
  ctx.strokeText(String(exScore).padStart(8,'0'), cx, cy + 8);
  ctx.fillStyle = '#ff0';
  ctx.fillText(String(exScore).padStart(8,'0'), cx, cy + 8);

  // Sub-text
  const subs = ['PERFECT BRAKE!!','SAFETY FIRST!!','AMAZING STOP!!','NO PROBLEM!!'];
  ctx.font = 'bold 11px monospace';
  ctx.lineWidth = 2; ctx.strokeStyle = '#000';
  const sub = subs[exScore % subs.length];
  ctx.strokeText(sub, cx, cy + 30);
  ctx.fillStyle = '#f4f';
  ctx.fillText(sub, cx, cy + 30);

  ctx.restore();
}

// ── Eject driver ───────────────────────────────────────────
function ejectDriver() {
  const vectors = [
    { vx:  0.5, vy: -20 },   // straight up
    { vx:  15,  vy: -14 },   // right-up
    { vx: -15,  vy: -14 },   // left-up
    { vx:   1,  vy:  18 },   // STRAIGHT DOWN
    { vx:  18,  vy:   4 },   // hard right
    { vx: -18,  vy:   4 },   // hard left
    { vx:   1,  vy: -22 },   // rocket vertical
    { vx:  19,  vy:  13 },   // diagonal down-right
    { vx: -19,  vy:  13 },   // diagonal down-left
    { vx:  13,  vy: -18 },   // steep right-up
    { vx: -13,  vy: -18 },   // steep left-up
  ];
  const v = vectors[Math.floor(Math.random() * vectors.length)];
  // Driver sits on top of car, slightly right of center
   // 車内の顔と同じ位置から飛び出す
  const baseX = state === S.STOP ? CAR_X + 41 : CAR_X + 37;
  const baseY = state === S.STOP ? carY - 30 : carY - 27;

  drv.x = baseX;
  drv.y = baseY;
  drv.vx    = v.vx + (Math.random() - 0.5) * 2;
  drv.vy    = v.vy + (Math.random() - 0.5) * 2;
  drv.angle = 0;
  drv.spin  = (Math.random() > 0.5 ? 1 : -1) * (0.25 + Math.random() * 0.35);
  drv.active = true;
  drv.trail  = [];
}

// ── Update ─────────────────────────────────────────────────
function update() {
  if (slowTimer > 0) {
    slowTimer--;
  }
  if (hitstop > 0) { hitstop--; return; }
  frame++;
  const bgm = document.getElementById('bgm');
  if (bgm && !bgm.paused) {
    bgm.playbackRate = 1 + speedDisp * 0.001;
  }
  // Road speed increases over time
 const roadSpd = 5 + speedDisp * 0.08;
  if (state === S.RUN) {
    scroll     += roadSpd;
    cliffX     -= roadSpd;          // cliff approaches at road speed
    cliffX     -= 0.3;              // + extra creep

    speedTarget = 80 + frame * 0.9;
    speedDisp  += (speedTarget - speedDisp) * 0.06;

    // Danger bar: how close is cliff?
    const danger = Math.max(0, Math.min(100, (1 - (cliffX - CAR_X - 60) / (CW * 0.7)) * 100));
    elDanger.style.width = danger + '%';

    // Car falls when it reaches cliff edge
    //if (!carFalling && CAR_X + 60 >= cliffX) {
     // carFalling = true; carVY = 0;
   // }
    if (carFalling) {
      carVY += 0.6;
      carY  += carVY;
      scroll += roadSpd; // world keeps moving
    }
    if (carY > CH + 60) {
      state = S.RESULT; resultTimer = frame;
      setTimeout(reset, 2200);
    }
  }

  if (state === S.FLY) {
    scroll += roadSpd;
    cliffX -= roadSpd;

    // Car continues to cliff and falls
    //if (!carFalling && CAR_X + 60 >= cliffX) {
      //carFalling = true; carVY = 0;
    //}
    if (carFalling) {
      carVY += 0.6;
      carY  += carVY;
    }

    // Driver physics
    drv.trail.push({ x: drv.x, y: drv.y, angle: drv.angle });
    if (drv.trail.length > 9) drv.trail.shift();
    drv.vy    += 0.27;
    drv.x     += drv.vx;
    drv.y     += drv.vy;
    drv.angle += drv.spin;

    // Show EXCELLENT after brief delay
    if (resultTimer === 0) resultTimer = frame;
    if (frame > resultTimer + 30) resultAlpha = Math.min(1, resultAlpha + 0.07);

    const off = drv.x < -60 || drv.x > CW + 60 || drv.y > CH + 60 || drv.y < -130;
    if (off && resultAlpha >= 1) state = S.RESULT;
  }

  if (state === S.RESULT) {
    resultAlpha = Math.min(1, resultAlpha + 0.04);
    if (frame > resultTimer + 300) reset();
  }

  elSpeed.textContent = String(Math.floor(speedDisp)).padStart(3, '0');
}

// ── Draw ───────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, CW, CH);

  ctx.save();

  if (speedDisp > 300) {
    const shake = Math.min(4, (speedDisp - 300) * 0.008);
    ctx.translate(
      (Math.random() - 0.5) * shake,
      (Math.random() - 0.5) * shake
    );
  }

  drawSky();
  drawGround();
  //drawCliff(cliffX);
  drawCar(CAR_X, carY);
  if (drv.active) drawDriver(drv);

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,0.09)';
  for (let y = 0; y < CH; y += 3) ctx.fillRect(0, y, CW, 1);

  drawFlash();
  drawResult();

  ctx.restore();
}
  
// ── Loop ───────────────────────────────────────────────────
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ── Brake ──────────────────────────────────────────────────
function onBrake() {
 
  if (state !== S.RUN) return;

  slowTimer   = 10;
  state       = S.STOP;
  hitstop     = 12;
  flashF      = 8;
  resultAlpha = 0;
  resultTimer = 0;
  carFalling  = false;
  carY        = CAR_DRAW_Y;
  carVY       = 0;
  exScore     = Math.floor(Math.random() * 89999999) + 10000000;
  elScore.textContent = String(exScore).padStart(7, '0');

  setTimeout(() => {
    slowTimer = 6;
    state = S.FLY;
    ejectDriver();
  }, 230);
}

// ── Input ──────────────────────────────────────────────────
const btn = document.getElementById('brake-btn');
btn.addEventListener('click', onBrake);
btn.addEventListener('touchstart', e => { e.preventDefault(); onBrake(); }, { passive:false });
canvas.addEventListener('click', onBrake);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onBrake(); }, { passive:false });
const startBtn = document.getElementById('start-btn');

startBtn.addEventListener('click', () => {
  const bgm = document.getElementById('bgm');
  if (bgm) {
    bgm.volume = 1;
    bgm.muted = false;
    bgm.play().then(() => {
      console.log('BGM再生成功');
    }).catch(err => {
      console.log('BGM再生失敗', err);
    });
  }

  startBtn.style.display = 'none';
});
  }

  startBtn.style.display = 'none';
});
loop();
</script>
</body>
</html>
